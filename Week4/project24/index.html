<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <h1>GitHub Profile Viewer</h1>
        <div class="inputfield">
            <input type="text" id="userinput" placeholder="Search the user:" required>
            <button id="searchbtn">Search</button>
        </div>
        <div class="results">
            <div id="userimg"></div>
            <h3 id="username"></h3>
            <p id="loginname"></p>
            <p id="userbio"></p>
            <div class="followclass">
                <p id="userfollowing"></p>
                <p id="userfollowers"></p>
            </div>
            <h4 id="url"></h4>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
