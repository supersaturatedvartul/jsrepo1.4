<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Notes App</h1>
        <div class="notes-content">
            <input type="text" id="notes-title" placeholder="Enter the Title:">
            <input type="text" id="notes" placeholder="What's in your mind?">
            <button id="store">Store</button>
        </div>
    </div>
    <div id="notepages"></div>
    <script src="index.js"></script>
</body>
</html>
